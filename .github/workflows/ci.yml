name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  OBSIDIAN_VERSION: 1.12.7

jobs:
  go:
    name: go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        # Limit to first-party packages so transient .worktrees/<id>
        # checkouts (when developers run CI locally via act) don't get
        # scanned. CI checkouts never see those.
        run: |
          unformatted=$(gofmt -l ./cmd ./internal)
          if [ -n "$unformatted" ]; then
            echo "gofmt would rewrite these files:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test -race
        run: go test ./... -race

      - name: QA CLI smoke test
        env:
          QA_TIMEOUT_TENTHS: 600
        run: make qa-cli

  plugin:
    name: obsidian-plugin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: obsidian-plugin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 22 (LTS). `npm test` uses `node --test 'src/**/*.test.ts'`
          # with a glob; glob support in `node --test` landed in Node 21.
          node-version: 22
          cache: npm
          cache-dependency-path: obsidian-plugin/package-lock.json

      - run: npm ci

      - name: typecheck
        run: npx tsc --noEmit

      - name: test
        run: npm test

      - name: build
        run: npm run build

  qa-plugin:
    name: qa-plugin (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: macos-latest
            label: macos
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: obsidian-plugin/package-lock.json

      - uses: actions/cache@v4
        with:
          path: ~/.cache/obsidian-desktop/${{ env.OBSIDIAN_VERSION }}
          key: obsidian-desktop-${{ runner.os }}-${{ env.OBSIDIAN_VERSION }}

      - name: Provision Obsidian (Linux)
        if: runner.os == 'Linux'
        run: |
          cache_dir="$HOME/.cache/obsidian-desktop/${OBSIDIAN_VERSION}"
          appimage="$cache_dir/Obsidian-${OBSIDIAN_VERSION}.AppImage"
          extracted="$cache_dir/squashfs-root/AppRun"

          mkdir -p "$cache_dir"

          if [[ ! -x "$appimage" ]]; then
            curl -fsSL -o "$appimage" "https://github.com/obsidianmd/obsidian-releases/releases/download/v${OBSIDIAN_VERSION}/Obsidian-${OBSIDIAN_VERSION}.AppImage"
            chmod +x "$appimage"
          fi

          if [[ ! -x "$extracted" ]]; then
            rm -rf "$cache_dir/squashfs-root"
            (
              cd "$cache_dir"
              "$appimage" --appimage-extract >/dev/null
            )
            test -d "$cache_dir/squashfs-root"
          fi

          test -x "$extracted"
          echo "OBSIDIAN_BIN=$extracted" >> "$GITHUB_ENV"

      - name: Provision Obsidian (macOS)
        if: runner.os == 'macOS'
        run: |
          cache_dir="$HOME/.cache/obsidian-desktop/${OBSIDIAN_VERSION}"
          dmg="$cache_dir/Obsidian-${OBSIDIAN_VERSION}.dmg"
          app_dir="$cache_dir/Obsidian.app"

          mkdir -p "$cache_dir"

          if [[ ! -f "$dmg" ]]; then
            curl -fsSL -o "$dmg" "https://github.com/obsidianmd/obsidian-releases/releases/download/v${OBSIDIAN_VERSION}/Obsidian-${OBSIDIAN_VERSION}.dmg"
          fi

          if [[ ! -x "$app_dir/Contents/MacOS/Obsidian" ]]; then
            rm -rf "$app_dir"
            mount_dir="$(mktemp -d)"
            trap 'hdiutil detach "$mount_dir" >/dev/null 2>&1 || true; rm -rf "$mount_dir"' EXIT
            hdiutil attach "$dmg" -nobrowse -readonly -mountpoint "$mount_dir"
            cp -R "$mount_dir/Obsidian.app" "$app_dir"
            hdiutil detach "$mount_dir"
            rm -rf "$mount_dir"
            trap - EXIT
            xattr -dr com.apple.quarantine "$app_dir" 2>/dev/null || true
          fi

          test -x "$app_dir/Contents/MacOS/Obsidian"
          echo "OBSIDIAN_BIN=$app_dir/Contents/MacOS/Obsidian" >> "$GITHUB_ENV"

      - name: Install Obsidian runtime deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk-bridge2.0-0 libgtk-3-0 libgbm1 libasound2t64

      - name: Prepare Obsidian config dir (Linux)
        if: runner.os == 'Linux'
        run: mkdir -p "$HOME/.config/obsidian"

      - name: Prepare Obsidian config dir (macOS)
        if: runner.os == 'macOS'
        run: mkdir -p "$HOME/Library/Application Support/obsidian"

      - name: QA plugin smoke test (Linux)
        if: runner.os == 'Linux'
        env:
          CI: "1"
          QA_PLUGIN_SKIP_OBSIDIAN_CLI_CHECK: "1"
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" make qa-plugin

      - name: QA plugin smoke test (macOS)
        if: runner.os == 'macOS'
        env:
          CI: "1"
          QA_PLUGIN_SKIP_OBSIDIAN_CLI_CHECK: "1"
        run: make qa-plugin

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qa-plugin-artifacts-${{ matrix.label }}
          path: |
            obsidian-plugin/playwright-report
            obsidian-plugin/test-results
          if-no-files-found: ignore
