version: 2

project_name: tickets

before:
  hooks:
    - go mod tidy -diff
    # Build the Obsidian plugin and package the three artefacts into
    # dist/tickets-board-plugin.zip, which is uploaded as a release
    # asset below. `tickets obsidian install` fetches this zip at
    # install time rather than embedding the bundle in the binary.
    - make plugin-zip

builds:
  - id: tickets
    main: ./cmd/tickets
    binary: tickets
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/stepandel/tickets-md/internal/cli.linkerVersion={{.Version}}

archives:
  - id: tickets
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

brews:
  - name: tickets
    repository:
      owner: stepandel
      name: homebrew-tap
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/stepandel/tickets-md
    description: Linear-style ticket tracker where every ticket is a markdown file
    license: MIT
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    install: |
      bin.install "tickets"
      generate_completions_from_executable(bin/"tickets", "completion")
    test: |
      system "#{bin}/tickets", "--version"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: stepandel
    name: tickets-md
  draft: false
  prerelease: auto
  extra_files:
    - glob: dist/tickets-board-plugin.zip
  header: |
    Install the CLI:

    ```sh
    go install github.com/stepandel/tickets-md/cmd/tickets@{{ .Tag }}
    ```

    Or download a prebuilt binary from the assets below and drop it on
    `$PATH`. After installing, ship the companion Obsidian plugin
    into a vault with `tickets obsidian install` — it fetches the
    matching `tickets-board-plugin.zip` from this release and caches
    it locally.
