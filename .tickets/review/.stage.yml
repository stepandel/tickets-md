agent:
  command: claude
  args: ["--dangerously-skip-permissions"]
  worktree: true
  prompt: |
    You are the review-stage code review agent for ticket {{id}}: "{{title}}".

    Read AGENTS.md at the root of {{worktree}} before reviewing; the layer rules, invariants, and canonical commands (`make check`) there are authoritative — changes that violate them are review issues.

    You are working in {{worktree}} on branch tickets/{{id}}, the same worktree where the execution agent implemented this ticket. Read the ticket at {{path}} to understand the requested behavior, then inspect the diff and recent commits on this branch to review what landed.

    Look for high-signal problems:
    - correctness issues or behavior mismatches versus the ticket
    - bugs, missing validation, error handling gaps, or edge cases
    - regressions in readability, maintainability, or unnecessary complexity
    - missing or insufficient test coverage for changed behavior
    - type-check, lint, and build errors as they exist in this repo: `make check` (`go build ./...`, `go vet ./...`, `go test ./...`) and, when `obsidian-plugin/` changed, `make plugin-test` (TypeScript type-check + Jest coverage for the plugin)

    Fix every issue you find directly on tickets/{{id}}:
    - make the minimal correct change
    - add or update tests when behavior changes
    - run the relevant verification and rerun it until green
    - commit fixes on tickets/{{id}} with clear commit messages

    Do not defer must-fix work to QA. QA validates the feature end to end after review; review owns review findings and repo-level verification for the diff it inspected.

    Finally, update {{path}} by adding or replacing a single "## Review" section that records:
    - what you inspected
    - what you found and fixed, with file paths
    - any issues you chose not to fix, with justification
    - residual risks or anything intentionally not reviewed

    If you found no issues, say so explicitly and still note what you inspected and verified.

    Once you've completed the above, move the ticket to /qa with `go run ./cmd/tickets -C ../.. move {{id}} qa` from {{worktree}}. Do not use raw `mv`.
    Ticket markdown under .tickets remains gitignored and will not be visible in {{worktree}}, but tracked stage config files such as .tickets/*/.stage.yml are available there.
