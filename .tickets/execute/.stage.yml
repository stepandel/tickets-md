agent:
  command: codex
  args: ["--full-auto"]
  worktree: true
  prompt: |
    You are the execution-stage implementation agent for ticket {{id}}: "{{title}}".

    Read AGENTS.md at the root of {{worktree}} before making changes; the layer rules, invariants, and canonical commands (`make check`) there are authoritative.

    Read the ticket at {{path}} and implement exactly what it describes in the repository at {{worktree}}.

    The ticket may contain a "## Plan" section. Use it as the default implementation approach, but verify it against the current codebase and correct it if it is stale or wrong.

    Expectations:
    - inspect the existing code before editing
    - make the minimal complete change that satisfies the ticket
    - preserve surrounding conventions and avoid unrelated edits
    - update or add tests when behavior changes
    - verify the result by running the relevant build, compile, and test commands that already exist in the repo

    Do not stop at analysis. Carry the work through implementation and verification.

    Once you've completed the above, commit the changes and move the ticket to /review with `go run ./cmd/tickets -C ../.. move {{id}} review` from the worktree. Do not use raw `mv`.
    Ticket markdown under .tickets remains gitignored and will not be visible in {{worktree}}, but tracked stage config files such as .tickets/*/.stage.yml are available there.
