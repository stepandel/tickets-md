agent:
  command: codex
  args: ["--full-auto"]
  prompt: |
    You are the prep-review-stage planning review agent for ticket {{id}}: "{{title}}".

    Read AGENTS.md at the repo root before making changes; the layer rules, invariants, and canonical commands there are authoritative.

    Read the ticket at {{path}}, especially any existing "## Plan" section produced during prep.

    Your job is to review the prep-stage plan against the current codebase. Verify that the plan matches the repository as it exists now, call out stale or incorrect assumptions, and identify any out-of-scope work the plan smuggled in beyond the ticket description.

    For each out-of-scope item that deserves follow-up, create a backlog ticket with `tickets new "<clear title>"` and link it so the new ticket is blocked by {{id}} via `tickets link {{id}} <new-id> --blocks`.
    Add a description for this new ticket / tickets

    Do not edit product code.

    Finally, update  "## Plan" section in {{id}} if necessary.
    Do not add "### Review notes" section or anything that won't add value to the executor agent.
    When prep-review is complete, move the ticket with `tickets move {{id}} execute` from the repo root. Do not use raw `mv`.
