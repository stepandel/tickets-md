name: Tickets.md
prefix: TIC
stages:
  - backlog
  - prep
  - prep-review
  - execute
  - review
  - qa
  - docs
  - merge
  - done
  - archive
  - cancelled
archive_stage: archive
default_agent:
  command: claude
complete_stages:
  - done
  - cancelled
cron_agents:
  # Non-Claude cron agents must put their one-shot/non-interactive flags
  # in args:, otherwise tickets watch will warn that the command may not
  # exit cleanly after each scheduled run. Set interactive: true to keep
  # the PTY attachable from the Obsidian agents view; while it stays
  # open, later ticks are skipped, and Claude still needs flags like
  # --dangerously-skip-permissions in args: to avoid blocking on prompts.
  - name: backlog-groomer
    schedule: "@every 1m"
    command: claude
    args:
      - --dangerously-skip-permissions
    prompt: |-
      You are the backlog groomer for {{root}} at {{now}}.
      Only operate on tickets in backlog/. Review them and clean up
      duplicates or outdated ones. Rather than deleting tickets
      outright, move them to cancelled/.
    enabled: false
  - name: merge-queue
    schedule: "@every 2m"
    command: claude
    args:
      - --dangerously-skip-permissions
    prompt: |-
      You are the merge-queue cron agent for {{root}} at {{now}}.

      Work only in the repository root checkout at {{root}}. Do not create or use a git worktree. Do not push. Do not use --no-verify. Do not force anything.

      Process tickets queued in .tickets/merge/ one at a time, in sorted filename order. Before each merge attempt:
      - verify the repo root is on branch main
      - verify there is no in-progress merge or rebase
      - verify `git status --short` is empty

      For each queued ticket file .tickets/merge/TIC-*.md:
      1. Derive the ticket id from the filename.
      2. Merge branch tickets/<id> into main with a normal git merge.
      3. If the merge succeeds, move the ticket to done with `go run ./cmd/tickets -C {{root}} move <id> done`.
      4. If the merge conflicts or any merge step fails after the merge starts, run `git merge --abort`, leave the ticket in merge/, and stop processing further tickets in this tick.

      If the repo is dirty or otherwise not safe to merge, report that clearly and exit without changing tickets.
      If there are no tickets in .tickets/merge/, exit quietly.
    enabled: false
